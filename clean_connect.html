<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00c896" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>CLEAN CONNECT – Automating urban cleanliness tracking</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0d1b2a;
      --surface:  #132233;
      --card:     #1a2e42;
      --border:   #1f3850;
      --green:    #00c896;
      --green-dim:#00a87c;
      --yellow:   #f5c542;
      --red:      #f26b6b;
      --blue:     #4da6ff;
      --text:     #e8f4f0;
      --muted:    #7a9bb0;
      --font-head: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; }

    /* ── LOGIN ─────────────────────────────────────────── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(ellipse at 50% 0%, #0a3d2e 0%, var(--bg) 65%);
    }
    .login-logo { font-size: 56px; margin-bottom: 12px; }
    .login-title { font-family: var(--font-head); font-size: 28px; font-weight: 700; color: var(--green); letter-spacing: -0.5px; }
    .login-sub   { color: var(--muted); font-size: 13px; margin-top: 4px; margin-bottom: 36px; }

    .role-cards  { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-bottom: 32px; }
    .role-card   {
      background: var(--card); border: 2px solid var(--border);
      border-radius: 16px; padding: 20px 24px;
      cursor: pointer; text-align: center; width: 140px;
      transition: border-color .2s, transform .15s;
    }
    .role-card:hover        { border-color: var(--green); transform: translateY(-3px); }
    .role-card.active       { border-color: var(--green); background: #0d2e22; }
    .role-card .role-icon   { font-size: 32px; margin-bottom: 8px; }
    .role-card .role-name   { font-family: var(--font-head); font-size: 13px; font-weight: 600; color: var(--text); }

    .login-form  { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 12px; }
    .login-form input {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 12px 16px; color: var(--text);
      font-family: var(--font-body); font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    .login-form input:focus { border-color: var(--green); }
    .login-form input::placeholder { color: var(--muted); }
    .btn-primary {
      background: var(--green); color: #0d1b2a;
      border: none; border-radius: 10px; padding: 13px;
      font-family: var(--font-head); font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background .2s;
    }
    .btn-primary:hover { background: var(--green-dim); }
    .login-hint { color: var(--muted); font-size: 11px; text-align: center; margin-top: 4px; }

    /* ── APP SHELL ─────────────────────────────────────── */
    #app { display: none; flex-direction: column; height: 100vh; }
    #app.visible { display: flex; }

    /* top bar */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-logo { font-size: 22px; }
    .topbar-title { font-family: var(--font-head); font-size: 17px; font-weight: 700; color: var(--green); }
    .topbar-role  { font-size: 11px; color: var(--muted); background: var(--card); border-radius: 20px; padding: 3px 10px; }
    .btn-logout   { background: none; border: 1.5px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; padding: 5px 12px; cursor: pointer; transition: border-color .2s; }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* content */
    .content { flex: 1; overflow-y: auto; padding: 18px; }

    /* bottom nav */
    .bottom-nav {
      display: flex; background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 10px 4px; background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 10px; font-family: var(--font-body);
      transition: color .2s; gap: 4px;
    }
    .nav-btn .nav-icon { font-size: 20px; }
    .nav-btn.active { color: var(--green); }

    /* ── CARDS / SHARED ────────────────────────────────── */
    .page { display: none; }
    .page.active { display: block; }

    .section-title {
      font-family: var(--font-head); font-size: 20px; font-weight: 700;
      margin-bottom: 16px; color: var(--text);
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; margin-bottom: 14px;
    }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .card-title  { font-family: var(--font-head); font-size: 15px; font-weight: 600; }
    .card-meta   { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .badge {
      border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600;
      font-family: var(--font-head); white-space: nowrap;
    }
    .badge-pending  { background: #2e2200; color: var(--yellow); }
    .badge-assigned { background: #0a2a3e; color: var(--blue); }
    .badge-resolved { background: #0a2e1e; color: var(--green); }
    .badge-urgent   { background: #2e0f0f; color: var(--red); }

    /* stat grid */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .stat-card  {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; text-align: center;
    }
    .stat-num   { font-family: var(--font-head); font-size: 32px; font-weight: 700; color: var(--green); }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* form */
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 11px 14px; color: var(--text);
      font-family: var(--font-body); font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--green); }
    .form-select { appearance: none; }
    .form-textarea { resize: vertical; min-height: 90px; }
    .btn-submit {
      width: 100%; background: var(--green); color: #0d1b2a;
      border: none; border-radius: 10px; padding: 13px;
      font-family: var(--font-head); font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 6px; transition: background .2s;
    }
    .btn-submit:hover { background: var(--green-dim); }
    .btn-action {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 6px 13px; font-size: 12px;
      color: var(--text); cursor: pointer; transition: border-color .2s, color .2s;
      font-family: var(--font-body);
    }
    .btn-action:hover { border-color: var(--green); color: var(--green); }
    .btn-action.green { border-color: var(--green); color: var(--green); }
    .btn-action.red   { border-color: var(--red);   color: var(--red); }

    /* progress bar */
    .progress-track { background: var(--surface); border-radius: 20px; height: 6px; overflow: hidden; }
    .progress-fill  { height: 100%; background: var(--green); border-radius: 20px; transition: width .4s; }

    /* map placeholder */
    .map-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; height: 200px; display: flex;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 8px; color: var(--muted);
      font-size: 13px; margin-bottom: 16px; overflow: hidden; position: relative;
    }
    .map-box canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    /* toast */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--green); color: #0d1b2a;
      padding: 10px 22px; border-radius: 30px; font-family: var(--font-head);
      font-size: 13px; font-weight: 700; opacity: 0; pointer-events: none;
      transition: opacity .3s, transform .3s; z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .tab  {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 7px 16px; font-size: 13px;
      color: var(--muted); cursor: pointer; transition: all .2s;
      font-family: var(--font-head); font-weight: 600;
    }
    .tab.active { border-color: var(--green); color: var(--green); background: #0a2e1e; }

    /* timeline */
    .timeline { position: relative; padding-left: 20px; }
    .timeline::before { content:''; position:absolute; left:6px; top:0; bottom:0; width:2px; background: var(--border); }
    .tl-item { position: relative; margin-bottom: 16px; }
    .tl-dot  { position:absolute; left:-17px; top:4px; width:10px; height:10px; border-radius:50%; background: var(--green); border:2px solid var(--bg); }
    .tl-dot.pending { background: var(--yellow); }
    .tl-dot.assigned { background: var(--blue); }
    .tl-time { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .tl-text { font-size: 13px; }

    /* upload zone */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 10px; padding: 24px;
      text-align: center; cursor: pointer; transition: border-color .2s; color: var(--muted);
      font-size: 13px;
    }
    .upload-zone:hover { border-color: var(--green); color: var(--green); }
    .upload-zone .upload-icon { font-size: 28px; margin-bottom: 6px; }

    /* logo image */
    .login-logo-img { width: 86px; height: 86px; object-fit: contain; margin-bottom: 10px; border-radius: 18px; }
    .topbar-logo-img { width: 26px; height: 26px; object-fit: contain; border-radius: 6px; }

    /* ── PIN MAP (citizen location pin) ─────────────── */
    .pin-map {
      position: relative; height: 170px; border-radius: 14px;
      border: 1.5px dashed var(--border); cursor: crosshair; overflow: hidden;
      background-color: #0f2535;
      background-image:
        linear-gradient(rgba(122,155,176,.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(122,155,176,.12) 1px, transparent 1px);
      background-size: 24px 24px;
      transition: border-color .2s;
    }
    .pin-map:hover { border-color: var(--green); }
    .pin-marker {
      position: absolute; display: none; font-size: 28px;
      transform: translate(-50%, -100%); filter: drop-shadow(0 2px 3px rgba(0,0,0,.4));
      pointer-events: none;
    }

    /* ── TRACKING STEPPER ──────────────────────────── */
    .tracker { display: flex; flex-direction: column; margin: 14px 0 4px; }
    .tracker-step { position: relative; display: flex; align-items: flex-start; gap: 12px; padding-bottom: 30px; }
    .tracker-step:last-child { padding-bottom: 0; }
    .tracker-line {
      position: absolute; left: 13px; top: 28px; bottom: 0; width: 3px;
      background: var(--border); transition: background .3s;
    }
    .tracker-step.done .tracker-line { background: var(--green); }
    .tracker-circle {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      background: var(--surface); border: 3px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: var(--muted); z-index: 1;
      transition: all .3s;
    }
    .tracker-step.done .tracker-circle    { background: var(--green); border-color: var(--green); color: #0d1b2a; }
    .tracker-step.current .tracker-circle { border-color: var(--green); color: var(--green); }
    .tracker-label { font-family: var(--font-head); font-size: 14px; font-weight: 600; padding-top: 4px; color: var(--muted); }
    .tracker-step.done .tracker-label,
    .tracker-step.current .tracker-label { color: var(--text); }

    /* ── MODAL (tracking popup) ────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 20px; width: 100%; max-width: 360px; max-height: 82vh; overflow-y: auto;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .modal-title  { font-family: var(--font-head); font-size: 17px; font-weight: 700; color: var(--green); }
    .modal-close  { background: none; border: none; color: var(--muted); font-size: 20px; line-height: 1; cursor: pointer; padding: 4px; }
    .modal-close:hover { color: var(--red); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>

  currentRole = r;

  const c = document.getElementById('main-content');
  const map = {
    report: pageCitizenReport,

    status: pageCitizenStatus,
    tasks: pageSupervisorTasks,

    map: pageSupervisorMap,
    dashboard: pageAdminDashboard,

}

function submitReport() {
  const title    = document.getElementById('c-title').value.trim();
  const pinLoc   = document.getElementById('c-pin-location').value;
  const zone     = document.getElementById('c-zone').value;
  const category = document.getElementById('c-category').value;
  const priority = document.getElementById('c-priority').value;
  const desc     = document.getElementById('c-desc').value.trim();
  if (!title) { showToast('⚠️ Please add a title'); return; }
  if (!pinLoc) { showToast('⚠️ Please pin your location on the map'); return; }
  if (!zone) { showToast('⚠️ Please select your zone'); return; }
  const id = 'RPT-00' + (reports.length + 1);
  const supervisor = zoneSupervisorMap[zone] || null;
  reports.push({ id, title, location: pinLoc, category, priority, status: 'pending', date: new Date().toISOString().slice(0,10), citizen:'You', supervisor, zone, labour:null, tracking:{stage:0, photo:null}, desc });
  showToast(`✅ Report submitted: ${id} — zonal supervisor ${supervisor} connected`);
  document.getElementById('c-title').value = '';
  document.getElementById('c-desc').value = '';
  document.getElementById('c-pin-location').value = '';
  document.getElementById('c-zone').value = '';
  document.getElementById('pin-marker').style.display = 'none';
  document.getElementById('pin-status').textContent = 'Tap on the map to drop a pin 📍';
  document.getElementById('pin-status').style.color = 'var(--muted)';
}

function dropPin(e) {
  const box = document.getElementById('pin-map-box');
  const rect = box.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * 100;
  const y = ((e.clientY - rect.top) / rect.height) * 100;
  const marker = document.getElementById('pin-marker');
  marker.style.left = x + '%';
  marker.style.top  = y + '%';
  marker.style.display = 'block';
  document.getElementById('c-pin-location').value = `Pinned location (${x.toFixed(0)}%, ${y.toFixed(0)}%)`;
  const status = document.getElementById('pin-status');
  status.textContent = '📍 Location pinned';
  status.style.color = 'var(--green)';
}

/* ══════════════════════════════════════════
   SHARED HELPERS
══════════════════════════════════════════ */
function reportCard(r, showActions) {
  return `
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">${r.title}</div>
        <div class="card-meta">${r.id} · ${r.location} · ${r.date}</div>
        <div class="card-meta" style="margin-top:2px">👤 ${r.citizen}${r.supervisor?` → 👷 ${r.supervisor}`:''}${r.labour?` → 🧹 ${r.labour}`:''}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">
        ${statusBadge(r.status)}
        ${priorityBadge(r.priority)}
      </div>
    </div>
    <div style="font-size:13px;color:var(--muted);line-height:1.5">${r.desc}</div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn-action green" onclick="openTracking('${r.id}')">🔍 Tracking</button>
    </div>
  </div>`;
}

function syncStatus(r) {
  const s = r.tracking.stage;
  r.status = s === 0 ? 'pending' : (s === 3 ? 'resolved' : 'assigned');
}

function statusBadge(s) {
  const map = { pending:'badge-pending', assigned:'badge-assigned', resolved:'badge-resolved' };
  return `<span class="badge ${map[s]||''}">${s.charAt(0).toUpperCase()+s.slice(1)}</span>`;
}

function priorityBadge(p) {
  if (p==='urgent') return `<span class="badge badge-urgent">🔴 Urgent</span>`;
  if (p==='high')   return `<span class="badge badge-pending">🟡 High</span>`;
  return '';
}

/* ══════════════════════════════════════════
   TRACKING STEPPER + MODAL
══════════════════════════════════════════ */
function renderTracker(stage) {
  const steps = ['Worker assigned', 'Work on process', 'Work completed'];
  return `<div class="tracker">${steps.map((label, i) => {
    const n = i + 1;
    const cls = n <= stage ? 'done' : (n === stage + 1 ? 'current' : '');
    return `<div class="tracker-step ${cls}">
      <div class="tracker-circle">${n <= stage ? '✓' : n}</div>
      <div class="tracker-label">${label}</div>
      ${i < steps.length - 1 ? '<div class="tracker-line"></div>' : ''}
    </div>`;
  }).join('')}</div>`;
}

let trackingTargetId = null;

function openTracking(id) {
  trackingTargetId = id;
  document.getElementById('tracking-modal').classList.add('show');
  renderTrackingModal();
}

function closeTrackingModal() {
  document.getElementById('tracking-modal').classList.remove('show');
  trackingTargetId = null;
}

function renderTrackingModal() {
  const r = reports.find(x => x.id === trackingTargetId);
  if (!r) return;
  const stage = r.tracking.stage;
  const body = document.getElementById('tracking-modal-body');
  let actionHtml = '';
  if (currentRole === 'supervisor') {
    if (stage === 0) {
      actionHtml = `<div class="login-hint" style="text-align:left;margin-top:10px">No worker assigned yet. Assign a labour from the Assign Labour tab.</div>`;
    } else if (stage === 1) {
      actionHtml = `<button class="btn-submit" style="margin-top:14px" onclick="advanceStage('${r.id}',2)">▶ Start Work (Mark In Process)</button>`;
    } else if (stage === 2) {
      actionHtml = `
      <div class="form-group" style="margin-top:14px">
        <label class="form-label">📷 Upload Completion Photo</label>
        <div class="upload-zone" onclick="document.getElementById('photo-input-${r.id}').click()">
          <div class="upload-icon">📷</div>Tap to upload photo
        </div>
        <input type="file" accept="image/*" id="photo-input-${r.id}" style="display:none" onchange="handlePhotoUpload(event,'${r.id}')">
        <div id="photo-preview-${r.id}"></div>
      </div>`;
    }
  }
  body.innerHTML = `
    <div class="card-meta" style="margin-bottom:4px">${r.id} · ${r.title}</div>
    ${renderTracker(stage)}
    ${stage === 3 && r.tracking.photo ? `<img src="${r.tracking.photo}" style="width:100%;border-radius:10px;margin-top:6px" />` : ''}
    ${actionHtml}
  `;
}

function advanceStage(id, stage) {
  const r = reports.find(x => x.id === id);
  if (!r) return;
  r.tracking.stage = stage;
  syncStatus(r);
  renderTrackingModal();
  showToast('🔧 Work started — marked as in process');
  navigateTo(currentPage);
}

function handlePhotoUpload(e, id) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function (ev) {
    const r = reports.find(x => x.id === id);
    if (!r) return;
    r._pendingPhoto = ev.target.result;
    document.getElementById('photo-preview-' + id).innerHTML = `
      <img src="${ev.target.result}" style="width:100%;border-radius:10px;margin-top:8px" />
      <button class="btn-submit" style="margin-top:8px" onclick="confirmCompletion('${id}')">✅ Confirm Work Completed</button>`;
  };
  reader.readAsDataURL(file);
}

function confirmCompletion(id) {
  const r = reports.find(x => x.id === id);
  if (!r || !r._pendingPhoto) { showToast('⚠️ Upload a photo first'); return; }
  r.tracking.photo = r._pendingPhoto;
  r.tracking.stage = 3;
  delete r._pendingPhoto;
  syncStatus(r);
  showToast('✅ Work marked as completed');
  renderTrackingModal();
  navigateTo(currentPage);
}

/* ══════════════════════════════════════════
   MINI MAP CANVAS
══════════════════════════════════════════ */
function drawMapCanvas() {
  requestAnimationFrame(() => {
    const canvas = document.getElementById('map-canvas');
    if (!canvas) return;
    const W = canvas.parentElement.offsetWidth;
    const H = canvas.parentElement.offsetHeight;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    // background grid
    ctx.fillStyle = '#0f2535';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#1a3550';
    ctx.lineWidth = 1;
    for (let x=0; x<W; x+=30) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y=0; y<H; y+=30) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    // road lines
    ctx.strokeStyle = '#1f4060'; ctx.lineWidth = 6;
    [[0,H*.4,W,H*.4],[W*.5,0,W*.5,H],[0,H*.7,W,H*.7],[W*.3,0,W*.3,H]].forEach(([x1,y1,x2,y2])=>{
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    });

    // pins
    const pins = [
      {x:.15,y:.25,s:'pending'},{x:.7,y:.45,s:'assigned'},{x:.45,y:.75,s:'resolved'},
      {x:.6,y:.2,s:'pending'},{x:.25,y:.6,s:'assigned'},
    ];
    const col = {pending:'#f5c542',assigned:'#4da6ff',resolved:'#00c896'};
    pins.forEach(p=>{
      const px=p.x*W, py=p.y*H;
      ctx.beginPath(); ctx.arc(px,py,8,0,Math.PI*2);
      ctx.fillStyle=col[p.s]+'55'; ctx.fill();
      ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2);
      ctx.fillStyle=col[p.s]; ctx.fill();
    });

    // legend
    [['Pending','#f5c542'],['Assigned','#4da6ff'],['Resolved','#00c896']].forEach(([l,c],i)=>{
      ctx.fillStyle=c; ctx.beginPath(); ctx.arc(12,12+i*18,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#7a9bb0'; ctx.font='11px Inter'; ctx.fillText(l,20,16+i*18);
    });
  });
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'),2800);
}
